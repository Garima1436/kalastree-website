<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cream background with rounded corners -->
  <rect width="100" height="100" rx="18" fill="#FFF8EE"/>

  <!-- Bold orange-red "K" -->
  <text x="14" y="74"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="700"
        font-size="62"
        fill="#E8380A">K</text>

  <!-- Italic golden "S" -->
  <text x="60" y="72"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="700"
        font-style="italic"
        font-size="38"
        fill="#D4A000">S</text>

  <!-- Marigold accent bar at bottom -->
  <rect x="12" y="84" width="76" height="3.5" rx="2" fill="#D4A000"/>
</svg>
